<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Brain — Audit</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    #status { font-size: 0.8rem; color: var(--muted); margin-left: auto; }

    .count-header {
      font-size: 0.875rem;
      color: var(--secondary);
      margin-bottom: 1.5rem;
    }

    .thought-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .thought-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .thought-card.fading {
      opacity: 0;
      transform: translateX(24px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.3rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-insight { background: rgba(129,140,248,0.15); color: #818cf8; }
    .badge-idea    { background: rgba(52,211,153,0.15);  color: #34d399; }
    .badge-project { background: rgba(251,146,60,0.15);  color: #fb923c; }
    .badge-person  { background: rgba(244,114,182,0.15); color: #f472b6; }
    .badge-admin   { background: rgba(148,163,184,0.15); color: #94a3b8; }

    .card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .card-summary {
      font-size: 0.875rem;
      color: var(--secondary);
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .field-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }

    .raw-text {
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      font-family: inherit;
      font-size: 0.8rem;
      color: var(--secondary);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      margin-bottom: 1rem;
    }

    .action-items-list {
      list-style: none;
      margin-bottom: 1rem;
    }

    .action-items-list li {
      font-size: 0.875rem;
      color: var(--text);
      padding: 0.2rem 0 0.2rem 1rem;
      position: relative;
      line-height: 1.4;
    }

    .action-items-list li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .card-footer {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .reason-input {
      flex: 1;
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--text);
      outline: none;
    }

    .reason-input:focus { border-color: var(--accent); }
    .reason-input::placeholder { color: var(--muted); }

    .archive-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1.1rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .archive-btn:hover:not(:disabled) { background: #6366f1; }
    .archive-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .inline-error {
      font-size: 0.8rem;
      color: #fca5a5;
      margin-top: 0.5rem;
      min-height: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">🧠 Second Brain</div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="audit.html" class="active">Audit</a>
    </nav>
  </aside>

  <div class="main">
    <header>
      <h1>Action Item Audit</h1>
      <span id="status">Loading…</span>
    </header>
    <div id="error" class="error-banner"></div>
    <p id="count-header" class="count-header"></p>
    <div id="thought-list" class="thought-list"></div>
  </div>
</div>

<script>
  const SUPABASE_URL           = "https://zkdblldjdgadqukpttwl.supabase.co";
  const SUPABASE_ANON_KEY      = "sb_publishable_4COct64LbSJa2dMNt23Kmw_Drb-qNEV";
  const SUPABASE_SERVICE_KEY   = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprZGJsbGRqZGdhZHF1a3B0dHdsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mjg0NDY2NCwiZXhwIjoyMDg4NDIwNjY0fQ.uoqeRdf9DZ3g9V8s2UEae3HkQwM9f9e3w7YHmtPi63U";

  // ── Crypto ──────────────────────────────────────────────────────────────────

  function normalizeText(text) {
    return text.toLowerCase().trim().replace(/\s+/g, ' ');
  }

  async function hashText(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(normalizeText(text)));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ── Supabase helpers ────────────────────────────────────────────────────────

  async function fetchThoughts() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/thoughts?status=eq.active&order=created_at.asc` +
      `&select=id,title,summary,raw_text,category,action_items,source,created_at&limit=500`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error(`Supabase ${res.status}: ${await res.text()}`);
    const data = await res.json();
    return data.filter(t => t.action_items && t.action_items.length > 0);
  }

  async function refetchRawText(id) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/thoughts?id=eq.${id}&select=raw_text`,
      { headers: { apikey: SUPABASE_SERVICE_KEY, Authorization: `Bearer ${SUPABASE_SERVICE_KEY}` } }
    );
    if (!res.ok) throw new Error(`Re-fetch failed: ${await res.text()}`);
    const [row] = await res.json();
    if (!row) throw new Error('Thought not found');
    return row.raw_text;
  }

  async function patchArchive(id, reason) {
    const currentRawText = await refetchRawText(id);
    const patch = { status: 'archived' };

    const trimmed = reason.trim();
    if (trimmed) {
      const date = new Date().toISOString().slice(0, 10);
      const newRawText = `${currentRawText}\nCompleted ${date}: ${trimmed}`;
      patch.raw_text     = newRawText;
      patch.content_hash = await hashText(newRawText);
    }

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/thoughts?id=eq.${id}`,
      {
        method: 'PATCH',
        headers: {
          apikey: SUPABASE_SERVICE_KEY,
          Authorization: `Bearer ${SUPABASE_SERVICE_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal',
        },
        body: JSON.stringify(patch),
      }
    );
    if (!res.ok) throw new Error(`Archive failed: ${await res.text()}`);
  }

  // ── UI helpers ──────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  let activeCount = 0;

  function setCountHeader() {
    const el = document.getElementById('count-header');
    if (activeCount === 0) {
      el.textContent = 'No active thoughts with action items.';
    } else {
      el.textContent = `${activeCount} thought${activeCount === 1 ? '' : 's'} with outstanding action items`;
    }
  }

  function renderCard(thought) {
    const card = document.createElement('div');
    card.className = 'thought-card';
    card.dataset.id = thought.id;

    const actionItemsHtml = thought.action_items
      .map(item => `<li>${esc(item)}</li>`)
      .join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${esc(thought.title || 'Untitled')}</span>
        <span class="badge badge-${esc(thought.category || 'admin')}">${esc(thought.category || '—')}</span>
      </div>
      <div class="card-meta">${formatDate(thought.created_at)}${thought.source ? ` · ${esc(thought.source)}` : ''}</div>
      ${thought.summary ? `<div class="card-summary">${esc(thought.summary)}</div>` : ''}
      <div class="field-label">Raw text</div>
      <pre class="raw-text">${esc(thought.raw_text || '')}</pre>
      <div class="field-label">Action items</div>
      <ul class="action-items-list">${actionItemsHtml}</ul>
      <div class="card-footer">
        <input type="text" class="reason-input" placeholder="Completion note (optional)" />
        <button class="archive-btn">Archive</button>
      </div>
      <div class="inline-error"></div>
    `;

    const btn         = card.querySelector('.archive-btn');
    const reasonInput = card.querySelector('.reason-input');
    const inlineError = card.querySelector('.inline-error');

    // Allow Enter key in reason field to trigger archive
    reasonInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      inlineError.textContent = '';
      try {
        await patchArchive(thought.id, reasonInput.value);
        card.classList.add('fading');
        setTimeout(() => {
          card.remove();
          activeCount--;
          setCountHeader();
          if (activeCount === 0) {
            document.getElementById('thought-list').innerHTML =
              '<div class="empty-state">All action items cleared. Nice work.</div>';
          }
        }, 370);
      } catch (err) {
        inlineError.textContent = err.message;
        btn.disabled = false;
      }
    });

    return card;
  }

  // ── Init ────────────────────────────────────────────────────────────────────

  async function init() {
    const statusEl = document.getElementById('status');
    const errorEl  = document.getElementById('error');
    const listEl   = document.getElementById('thought-list');

    try {
      const thoughts = await fetchThoughts();
      activeCount = thoughts.length;
      setCountHeader();

      if (thoughts.length === 0) {
        listEl.innerHTML = '<div class="empty-state">No active thoughts with action items.</div>';
      } else {
        const frag = document.createDocumentFragment();
        thoughts.forEach(t => frag.appendChild(renderCard(t)));
        listEl.appendChild(frag);
      }

      statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      statusEl.textContent  = 'Error';
      errorEl.style.display = 'block';
      errorEl.textContent   = `Failed to load: ${err.message}`;
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
