<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Brain Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header span { font-size: 0.85rem; color: #64748b; }

    #status {
      font-size: 0.8rem;
      color: #64748b;
      margin-left: auto;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #1e2330;
      border: 1px solid #2d3347;
      border-radius: 10px;
      padding: 1.2rem 1rem;
      text-align: center;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #818cf8;
      line-height: 1;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 1.5rem;
    }

    .chart-card {
      background: #1e2330;
      border: 1px solid #2d3347;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .chart-card.wide {
      grid-column: 1 / -1;
    }

    .chart-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 1.2rem;
    }

    .chart-wrap {
      position: relative;
      height: 240px;
    }

    .chart-wrap.tall { height: 300px; }

    #error {
      display: none;
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 1rem;
      color: #fca5a5;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🧠 Second Brain</h1>
  <span>Thinking patterns dashboard</span>
  <span id="status">Loading…</span>
</header>

<div id="error"></div>

<div class="stats-row">
  <div class="stat-card"><div class="value" id="s-total">—</div><div class="label">Total thoughts</div></div>
  <div class="stat-card"><div class="value" id="s-active">—</div><div class="label">Active</div></div>
  <div class="stat-card"><div class="value" id="s-review">—</div><div class="label">Needs review</div></div>
  <div class="stat-card"><div class="value" id="s-archived">—</div><div class="label">Archived</div></div>
  <div class="stat-card"><div class="value" id="s-30d">—</div><div class="label">Last 30 days</div></div>
  <div class="stat-card"><div class="value" id="s-people">—</div><div class="label">People tracked</div></div>
</div>

<div class="charts-grid">
  <div class="chart-card wide">
    <h2>Captures per day — last 30 days</h2>
    <div class="chart-wrap tall"><canvas id="chart-daily"></canvas></div>
  </div>

  <div class="chart-card">
    <h2>Category breakdown</h2>
    <div class="chart-wrap"><canvas id="chart-category"></canvas></div>
  </div>

  <div class="chart-card">
    <h2>Status breakdown</h2>
    <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
  </div>

  <div class="chart-card">
    <h2>Capture source</h2>
    <div class="chart-wrap"><canvas id="chart-source"></canvas></div>
  </div>

  <div class="chart-card">
    <h2>Top 10 topics</h2>
    <div class="chart-wrap tall"><canvas id="chart-topics"></canvas></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://zkdblldjdgadqukpttwl.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_4COct64LbSJa2dMNt23Kmw_Drb-qNEV";

  const PALETTE = ["#818cf8","#34d399","#fb923c","#f472b6","#60a5fa","#a78bfa","#facc15","#2dd4bf","#f87171","#94a3b8"];
  const GRID_COLOR = "#2d3347";
  const TEXT_COLOR = "#94a3b8";

  Chart.defaults.color = TEXT_COLOR;
  Chart.defaults.borderColor = GRID_COLOR;
  Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  Chart.defaults.font.size = 12;

  async function fetchAll() {
    // Fetch all thoughts (paginate via range header — Supabase default limit 1000)
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/thoughts?select=created_at,category,topics,source,status,people&order=created_at.desc&limit=2000`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error(`Supabase error ${res.status}: ${await res.text()}`);
    return res.json();
  }

  function countBy(arr, key) {
    return arr.reduce((acc, item) => {
      const val = item[key] || "unknown";
      acc[val] = (acc[val] || 0) + 1;
      return acc;
    }, {});
  }

  function last30Days() {
    const days = [];
    const now = new Date();
    for (let i = 29; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(d.toISOString().slice(0, 10));
    }
    return days;
  }

  function donut(id, labels, data, colors) {
    new Chart(document.getElementById(id), {
      type: "doughnut",
      data: { labels, datasets: [{ data, backgroundColor: colors || PALETTE, borderWidth: 2, borderColor: "#1e2330" }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: "right", labels: { boxWidth: 12, padding: 14 } } },
        cutout: "60%",
      }
    });
  }

  function hbar(id, labels, data) {
    new Chart(document.getElementById(id), {
      type: "bar",
      data: { labels, datasets: [{ data, backgroundColor: PALETTE[0], borderRadius: 4, borderSkipped: false }] },
      options: {
        indexAxis: "y",
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: GRID_COLOR }, ticks: { precision: 0 } },
          y: { grid: { display: false } },
        }
      }
    });
  }

  function bar(id, labels, data) {
    new Chart(document.getElementById(id), {
      type: "bar",
      data: { labels, datasets: [{ data, backgroundColor: PALETTE[0], borderRadius: 3, borderSkipped: false }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { maxRotation: 45, minRotation: 30, font: { size: 10 } } },
          y: { grid: { color: GRID_COLOR }, ticks: { precision: 0 } },
        }
      }
    });
  }

  async function init() {
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");

    try {
      const thoughts = await fetchAll();
      const now = new Date();
      const cutoff30 = new Date(now); cutoff30.setDate(cutoff30.getDate() - 30);

      // ── Stats ──────────────────────────────────────────────────────────────
      const active   = thoughts.filter(t => t.status === "active").length;
      const review   = thoughts.filter(t => t.status === "needs_review").length;
      const archived = thoughts.filter(t => t.status === "archived").length;
      const last30   = thoughts.filter(t => new Date(t.created_at) >= cutoff30).length;

      const allPeople = new Set();
      thoughts.forEach(t => (t.people || []).forEach(p => allPeople.add(p.toLowerCase())));

      document.getElementById("s-total").textContent   = thoughts.length;
      document.getElementById("s-active").textContent  = active;
      document.getElementById("s-review").textContent  = review;
      document.getElementById("s-archived").textContent= archived;
      document.getElementById("s-30d").textContent     = last30;
      document.getElementById("s-people").textContent  = allPeople.size;

      // ── Daily captures bar chart ───────────────────────────────────────────
      const days = last30Days();
      const byday = {};
      thoughts.filter(t => new Date(t.created_at) >= cutoff30).forEach(t => {
        const day = t.created_at.slice(0, 10);
        byday[day] = (byday[day] || 0) + 1;
      });
      bar("chart-daily", days.map(d => d.slice(5)), days.map(d => byday[d] || 0));

      // ── Category donut ─────────────────────────────────────────────────────
      const catCounts = countBy(thoughts, "category");
      donut("chart-category", Object.keys(catCounts), Object.values(catCounts));

      // ── Status donut ───────────────────────────────────────────────────────
      donut("chart-status",
        ["Active", "Needs Review", "Archived"],
        [active, review, archived],
        [PALETTE[0], PALETTE[2], PALETTE[9]]
      );

      // ── Source donut ───────────────────────────────────────────────────────
      const srcCounts = countBy(thoughts, "source");
      donut("chart-source", Object.keys(srcCounts), Object.values(srcCounts));

      // ── Top 10 topics horizontal bar ───────────────────────────────────────
      // Exclude meta/routing tags — they're system labels, not content topics
      const META_TOPICS = new Set(["follow-up", "followup", "reminder", "birthday", "anniversary"]);
      const topicCounts = {};
      thoughts.forEach(t => (t.topics || []).forEach(topic => {
        if (!META_TOPICS.has(topic.toLowerCase())) {
          topicCounts[topic] = (topicCounts[topic] || 0) + 1;
        }
      }));
      const topTopics = Object.entries(topicCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);
      hbar("chart-topics", topTopics.map(([t]) => t), topTopics.map(([, n]) => n));

      const ts = new Date().toLocaleTimeString();
      statusEl.textContent = `Updated ${ts}`;
    } catch (err) {
      statusEl.textContent = "Error";
      errorEl.style.display = "block";
      errorEl.textContent = `Failed to load data: ${err.message}`;
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
